services:
  mongodb:
    image: mongo:6
    container_name: procurement_mongo
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: procurement_backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      MONGO_URL: "mongodb://mongodb:27017"
      DB_NAME: "procurement_analytics"
      CORS_ORIGINS: "*"
      JWT_SECRET: "change_this_in_production_procurement_maha_2026"
      JWT_ALGORITHM: "HS256"
      JWT_EXPIRES_MINUTES: "720"
      HIGH_VALUE_THRESHOLD_CR: "10"
      SEED_DATA_ON_STARTUP: "true"
      SEED_EXCEL_PATH: "/app/uploaded_data/abcd.xlsx"
      ENABLE_SCHEDULER: "true"
      SCHEDULER_INTERVAL_MINUTES: "60"
      ALERT_PAYMENT_COMPLETION_MIN: "60"
      ALERT_BACKLOG_PCT_MAX: "25"
      ALERT_RISK_EXPOSURE_MAX: "30"
      ALERT_PO_CONVERSION_MIN: "50"
      ESCALATION_L1_DAYS: "7"
      ESCALATION_L2_DAYS: "14"
      ESCALATION_L5_DAYS: "30"
      SMTP_HOST: ""
      SMTP_PORT: "587"
      SMTP_USER: ""
      SMTP_PASS: ""
      SMTP_FROM: "procurement-alerts@maha.gov.in"
      SMTP_TLS: "true"
    ports:
      - "8001:8001"
    volumes:
      - ./uploaded_data:/app/uploaded_data

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        REACT_APP_BACKEND_URL: "http://localhost:8001"
    container_name: procurement_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  mongodb_data:
